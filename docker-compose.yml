services:
  pgsql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: briefwala
      POSTGRES_USER: briefwala
      POSTGRES_PASSWORD: secret
    ports:
      - '5434:5432'
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U briefwala']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgsql_data:
